name: release
on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
env:
  APP_NAME: 'dfkup'
  NIM_VERSION: 'stable'
  MAINTAINER: 'OpenPeeps'

jobs:
  build-artifact:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x86_64
          - os: windows-latest
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Cache nimble
        id: cache-nimble
        uses: actions/cache@v4
        with:
          path: ~/.nimble
          key: ${{ runner.os }}-${{ runner.arch }}-nim-${{ env.NIM_VERSION }}-nimble-${{ hashFiles('**/*.nimble', '**/nimble.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-nim-${{ env.NIM_VERSION }}-nimble-
            ${{ runner.os }}-${{ runner.arch }}-nimble-
        if: runner.os != 'Windows'

      - uses: georgelemon/setup-nim-action@master
        with:
          nim-version: ${{ env.NIM_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: nimble build -Y -d:release

      - name: Create artifact
        run: |
          os="${{ runner.os }}"
          arch="${{ matrix.arch }}"
          suffix="$os${arch:+-$arch}"
          assets="${{ env.APP_NAME }}_$(echo "$suffix" | tr '[:upper:]' '[:lower:]')"
          mkdir -p "dist/$assets"
          if [ "${{ runner.os }}" = "Windows" ]; then
            exe="${{ env.APP_NAME }}.exe"
            # binary could be in bin/, project root, or elsewhere — find it
            src=$(find . -maxdepth 2 -name "$exe" -type f | head -1)
            if [ -z "$src" ]; then
              echo "::error:: Binary not found. Searching..."
              find . -name "$exe" -type f
              exit 1
            fi
            cp "$src" "dist/$assets/"
          else
            cp "bin/${{ env.APP_NAME }}" "dist/$assets/"
          fi
          cp LICENSE README.* "dist/$assets/" 2>/dev/null || true
          (cd dist && tar czf "$assets.tar.gz" "$assets")
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-artifact
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
